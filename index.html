<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="نظام حجز متكامل لرحلات الطيران والباصات مع توثيق الهوية">
    <title>الراقي للحجز | طيران وباصات - نظام متكامل مع Firebase</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK v10 (modular) -->
    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js",
            "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
        }
    }
    </script>
    
    <style>
        /* ========== المتغيرات الأساسية ========== */
        :root {
            --primary: #134b66;
            --primary-dark: #0b2b40;
            --secondary: #1b6b8f;
            --accent: #f9c74f;
            --accent-hover: #e6b43a;
            --success: #2a9d8f;
            --danger: #e76f51;
            --warning: #c47a00;
            --bg-primary: #f5f7fc;
            --bg-secondary: #eef2f5;
            --card-bg: #ffffff;
            --text-primary: #134b66;
            --text-secondary: #4a6f8a;
            --border-color: #dce4ec;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 8px 25px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 35px -12px rgba(0,0,0,0.15);
            --radius-sm: 12px;
            --radius-md: 24px;
            --radius-lg: 32px;
            --radius-full: 100px;
            --transition: all 0.25s ease;        }

        /* ========== دعم الوضع الليلي ========== */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f172a;
                --bg-secondary: #1e293b;
                --card-bg: #1e293b;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --border-color: #334155;
                --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
                --shadow-md: 0 8px 25px rgba(0,0,0,0.4);
                --shadow-lg: 0 20px 35px -12px rgba(0,0,0,0.5);
            }
        }

        /* ========== الأساسيات ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            padding: 20px;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container { max-width: 1400px; margin: auto; }

        /* ========== الهيدر والشعار ========== */
        .header { 
            text-align: center; 
            margin-bottom: 40px; 
            padding: 20px 0;
        }
        
        .logo {
            background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
        }
        
        .logo:hover { transform: translateY(-2px); }        
        .logo h1 { 
            font-size: 1.8rem; 
            color: var(--accent); 
            font-weight: 800;
        }
        
        .logo span { 
            color: #f0f3f5; 
            font-size: 0.95rem;
            opacity: 0.9;
        }

        /* ========== البطاقات ========== */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 30px;
            margin-bottom: 35px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }
        
        .card:hover { transform: translateY(-3px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2); }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            border-right: 5px solid var(--accent);
            padding-right: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* ========== الشبكة النموذجية ========== */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;            gap: 8px;
        }

        .input-group label {
            font-weight: 500;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
        }

        .required { color: var(--danger); margin-right: 3px; }

        input, select, .file-label {
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border-color);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
            background: var(--card-bg);
            color: var(--text-primary);
            width: 100%;
        }

        input:focus, select:focus { 
            border-color: var(--accent); 
            outline: none; 
            box-shadow: 0 0 0 4px rgba(249,199,79,0.15); 
        }

        input:invalid:not(:placeholder-shown) {
            border-color: var(--danger);
        }

        .file-label {
            background: var(--bg-secondary);
            text-align: center;
            cursor: pointer;
            border-style: dashed;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 50px;
        }

        .file-label:hover { 
            border-color: var(--accent);             background: rgba(249,199,79,0.1); 
        }

        .file-info { 
            font-size: 0.8rem; 
            color: var(--text-secondary); 
            margin-top: 6px;
            display: block;
            word-break: break-all;
        }

        /* ========== الأزرار ========== */
        .btn-submit {
            background: linear-gradient(95deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-weight: 700;
            padding: 16px 24px;
            border-radius: var(--radius-full);
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-size: 1.1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 50px;
        }

        .btn-submit:hover { 
            transform: scale(0.98); 
            opacity: 0.95; 
            box-shadow: 0 10px 30px rgba(19,75,102,0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-logout {
            background: var(--danger);
            width: auto;
            padding: 10px 24px;
            font-size: 0.95rem;
        }
        .btn-logout:hover { background: #c13d3d; }

        .btn-admin {
            background: var(--accent);
            color: var(--primary-dark);
            border: none;
            padding: 10px 28px;
            border-radius: var(--radius-full);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-admin:hover { 
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* ========== الجداول ========== */
        .table-wrapper {
            overflow-x: auto;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 900px;
        }

        th { 
            background: var(--bg-secondary); 
            padding: 14px 12px; 
            color: var(--text-primary);
            font-weight: 700;
            text-align: right;
            border-bottom: 2px solid var(--border-color);
            font-size: 0.95rem;
        }

        td { 
            padding: 14px 12px; 
            border-bottom: 1px solid var(--border-color); 
            vertical-align: middle; 
            font-size: 0.95rem;
        }
        tr:hover { background: rgba(249,199,79,0.05); }

        .status-badge { 
            padding: 6px 16px; 
            border-radius: 50px; 
            font-size: 0.8rem; 
            font-weight: 600; 
            display: inline-block;
        }

        .status-pending { 
            background: rgba(255,243,205,0.8); 
            color: var(--warning); 
            border: 1px solid #ffe08a;
        }

        .status-approved { 
            background: rgba(224,247,234,0.8); 
            color: #1e7b48; 
            border: 1px solid #86efac;
        }

        .thumbnail-img { 
            width: 52px; 
            height: 52px; 
            object-fit: cover; 
            border-radius: var(--radius-sm); 
            cursor: pointer; 
            border: 2px solid var(--border-color);
            transition: var(--transition);
        }

        .thumbnail-img:hover { 
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .action-btn { 
            background: none; 
            border: none; 
            font-size: 1.1rem; 
            margin: 0 3px; 
            cursor: pointer; 
            padding: 8px; 
            border-radius: 50%; 
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;            justify-content: center;
            transition: var(--transition);
        }

        .approve-btn { 
            color: var(--success); 
            background: rgba(42,157,143,0.1); 
        }
        
        .approve-btn:hover { background: rgba(42,157,143,0.2); transform: scale(1.1); }

        .delete-btn { 
            color: var(--danger); 
            background: rgba(231,111,81,0.1); 
        }
        
        .delete-btn:hover { background: rgba(231,111,81,0.2); transform: scale(1.1); }

        /* ========== تسجيل الدخول ========== */
        .login-overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.85); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .login-card {
            background: var(--card-bg); 
            border-radius: var(--radius-lg); 
            padding: 35px; 
            width: 90%; 
            max-width: 420px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }
        .login-card h3 {
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-card input {
            margin: 12px 0;
            border-radius: var(--radius-sm);
        }

        .login-card p {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: var(--radius-sm);
        }

        .login-card button:last-of-type {
            margin-top: 15px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .login-card button:last-of-type:hover { color: var(--primary); }

        /* ========== التنبيهات ========== */
        .toast-msg {
            position: fixed; 
            bottom: 25px; 
            left: 25px; 
            background: var(--primary); 
            color: white;
            padding: 14px 28px; 
            border-radius: var(--radius-full); 
            z-index: 3000;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-md);            animation: slideIn 0.3s ease, fadeOut 0.3s ease 3.7s forwards;
            max-width: 350px;
        }

        .toast-msg.error { background: var(--danger); }
        .toast-msg.success { background: var(--success); }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(-20px); }
        }

        /* ========== المودال ========== */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            justify-content: center; 
            align-items: center; 
            z-index: 4000;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.2s ease;
        }

        .modal-content { 
            background: var(--card-bg); 
            border-radius: var(--radius-lg); 
            padding: 20px; 
            max-width: 95%; 
            max-height: 90vh;
            overflow: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-content img { 
            max-width: 100%; 
            max-height: 75vh; 
            border-radius: var(--radius-md); 
            object-fit: contain;
        }

        .modal-content button {            margin-top: 18px; 
            padding: 10px 28px; 
            border-radius: var(--radius-full); 
            border: none; 
            background: var(--primary); 
            color: white; 
            cursor: pointer; 
            font-weight: 600;
            transition: var(--transition);
        }

        .modal-content button:hover { background: var(--secondary); }

        /* ========== أدوات مساعدة ========== */
        .flex-between { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 15px; 
        }

        .text-center { text-align: center; }
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .text-warning { color: var(--warning); }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        /* ========== التحميل والاتصال ========== */
        .connection-status {
            position: fixed;
            top: 15px;
            left: 15px;
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 1000;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-sm);
        }

        .connection-status.offline {
            display: flex;
            background: var(--danger);
            color: white;
        }

        .connection-status.online {
            display: flex;
            background: var(--success);
            color: white;
        }

        /* ========== تحسينات الجوال ========== */
        @media (max-width: 768px) {
            body { padding: 15px; }
            
            .card { 
                padding: 20px 16px; 
                border-radius: var(--radius-md);
            }
            
            .card-title { 
                font-size: 1.4rem; 
                padding-right: 12px;
            }
            
            .form-grid { 
                grid-template-columns: 1fr !important; 
                gap: 16px;
            }
            
            th, td { 
                font-size: 0.85rem;                 padding: 10px 8px; 
            }
            
            .thumbnail-img { 
                width: 44px; 
                height: 44px; 
            }
            
            .action-btn { 
                width: 34px; 
                height: 34px; 
                font-size: 1rem;
            }
            
            .logo h1 { font-size: 1.5rem; }
            .logo span { font-size: 0.85rem; }
            
            .toast-msg {
                left: 15px;
                right: 15px;
                max-width: none;
            }
        }

        /* ========== تحسينات اللمس ========== */
        @media (hover: none) {
            .btn-submit, .action-btn, .thumbnail-img {
                min-height: 48px;
                min-width: 48px;
            }
        }

        /* ========== تحسينات إمكانية الوصول ========== */
        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* تركيز لوحة المفاتيح */        :focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

<!-- مؤشر حالة الاتصال -->
<div id="connectionStatus" class="connection-status">
    <i class="fas fa-wifi"></i>
    <span id="connectionText">جاري التحقق من الاتصال...</span>
</div>

<div class="container">
    <!-- الهيدر -->
    <header class="header">
        <div class="logo" role="banner">
            <h1>الرَاقي <i class="fas fa-plane-departure" aria-hidden="true"></i></h1>
            <span>سفر وباصات فاخرة • حجز آمن مع توثيق الهوية</span>
        </div>
        <button id="showAdminLoginBtn" class="btn-admin" style="margin-top:20px;">
            <i class="fas fa-lock" aria-hidden="true"></i> دخول المشرف
        </button>
    </header>

    <!-- نموذج حجز العملاء -->
    <main>
        <section class="card" aria-labelledby="booking-form-title">
            <h2 id="booking-form-title" class="card-title">
                <span><i class="fas fa-pen-alt" aria-hidden="true"></i> طلب حجز جديد</span>
            </h2>
            
            <form id="bookingForm" novalidate>
                <div class="form-grid">
                    <div class="input-group">
                        <label for="fullName">
                            <i class="fas fa-user" aria-hidden="true"></i> 
                            الاسم الكامل <span class="required" aria-label="مطلوب">*</span>
                        </label>
                        <input type="text" id="fullName" name="fullName" required 
                               pattern="^[\u0600-\u06FF\s\w]{3,50}$"
                               placeholder="أدخل اسمك الكامل"
                               aria-required="true">
                    </div>
                    
                    <div class="input-group">
                        <label for="phone">
                            <i class="fas fa-phone-alt" aria-hidden="true"></i> 
                            رقم الجوال <span class="required">*</span>                        </label>
                        <input type="tel" id="phone" name="phone" 
                               placeholder="05xxxxxxxx" required
                               pattern="^05[0-9]{8}$"
                               aria-required="true"
                               title="يرجى إدخال رقم جوال سعودي صحيح">
                    </div>
                    
                    <div class="input-group">
                        <label for="tripType">
                            <i class="fas fa-bus" aria-hidden="true"></i> نوع الرحلة
                        </label>
                        <select id="tripType" name="tripType" required aria-required="true">
                            <option value="طيران">✈️ طيران</option>
                            <option value="باصات">🚍 باصات داخلي</option>
                        </select>
                    </div>
                    
                    <div class="input-group">
                        <label for="destination">
                            <i class="fas fa-map-marker-alt" aria-hidden="true"></i> الوجهة <span class="required">*</span>
                        </label>
                        <input type="text" id="destination" name="destination" 
                               placeholder="مثال: الرياض - دبي" required
                               aria-required="true">
                    </div>
                    
                    <div class="input-group">
                        <label for="travelDate">
                            <i class="fas fa-calendar-alt" aria-hidden="true"></i> تاريخ الرحلة <span class="required">*</span>
                        </label>
                        <input type="date" id="travelDate" name="travelDate" required aria-required="true">
                    </div>
                    
                    <div class="input-group">
                        <label for="ticketsCount">
                            <i class="fas fa-ticket" aria-hidden="true"></i> عدد التذاكر
                        </label>
                        <input type="number" id="ticketsCount" name="ticketsCount" 
                               min="1" max="20" value="1" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="receiptFile">
                            <i class="fas fa-upload" aria-hidden="true"></i> 
                            سند الإيداع (بنك/صرافة) <span class="required">*</span>
                        </label>
                        <input type="file" id="receiptFile" name="receiptFile" 
                               accept="image/*,.pdf" style="display:none;" required aria-required="true">
                        <div class="file-label" id="receiptLabel" role="button" tabindex="0"                             aria-label="اختر صورة سند الإيداع">
                            <i class="fas fa-cloud-upload-alt" aria-hidden="true"></i> اختر صورة السند
                        </div>
                        <span id="receiptName" class="file-info" aria-live="polite">لم يتم رفع ملف</span>
                    </div>
                    
                    <div class="input-group">
                        <label for="idFile">
                            <i class="fas fa-id-card" aria-hidden="true"></i> 
                            صورة الجواز / البطاقة <span class="required">*</span>
                        </label>
                        <input type="file" id="idFile" name="idFile" 
                               accept="image/*,.pdf" style="display:none;" required aria-required="true">
                        <div class="file-label" id="idLabel" role="button" tabindex="0"
                             aria-label="اختر صورة الهوية">
                            <i class="fas fa-id-card" aria-hidden="true"></i> اختر صورة الهوية
                        </div>
                        <span id="idName" class="file-info" aria-live="polite">لم يتم رفع ملف</span>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fas fa-check-circle" aria-hidden="true"></i> إرسال طلب الحجز
                </button>
            </form>
        </section>

        <!-- لوحة التحكم (تظهر فقط بعد تسجيل الدخول) -->
        <section id="adminPanel" style="display:none;" aria-labelledby="admin-title">
            <div class="card">
                <div class="flex-between">
                    <h2 id="admin-title" class="card-title">
                        <span><i class="fas fa-tachometer-alt" aria-hidden="true"></i> لوحة التحكم</span>
                    </h2>
                    <button id="logoutBtn" class="btn-submit btn-logout">
                        <i class="fas fa-sign-out-alt" aria-hidden="true"></i> خروج
                    </button>
                </div>

<script type="module">
    // ========== استيراد Firebase ==========
    import { initializeApp } from "firebase/app";
    import { 
        getDatabase, ref, push, set, onValue, update, remove, 
        onDisconnect, goOnline, goOffline 
    } from "firebase/database";
    import { 
        getStorage, ref as storageRef, uploadBytes, getDownloadURL, 
        deleteObject 
    } from "firebase/storage";
    import { 
        getAuth, signInWithEmailAndPassword, signOut, 
        onAuthStateChanged, createUserWithEmailAndPassword 
    } from "firebase/auth";

    // ========== إعدادات Firebase ==========
    // ⚠️ ملاحظة: في الإنتاج، استخدم متغيرات البيئة أو Cloud Functions
    const firebaseConfig = {
        apiKey: "AIzaSyCJVxsARueQKDK6ETJonkV-ov8jRRLreXg",        authDomain: "office-alhami.firebaseapp.com",
        databaseURL: "https://office-alhami-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "office-alhami",
        storageBucket: "office-alhami.firebasestorage.app",
        messagingSenderId: "77683467575",
        appId: "1:77683467575:web:05c492a00676334528a6b2"
    };

    // ========== تهيئة Firebase ==========
    let app, db, storage, auth;
    
    try {
        app = initializeApp(firebaseConfig);
        db = getDatabase(app);
        storage = getStorage(app);
        auth = getAuth(app);
        
        // ✅ تفعيل إعادة الاتصال التلقائي
        onDisconnect(ref(db, '.info/connected')).onValue((snapshot) => {
            updateConnectionStatus(snapshot.val());
        });
        
    } catch (error) {
        console.error('❌ فشل تهيئة Firebase:', error);
        showMessage('خطأ في الاتصال بالخدمة', true);
    }

    // ========== المتغيرات العامة ==========
    let currentUser = null;
    let bookingsListener = null;
    let allBookings = [];
    const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5MB

    // ========== دوال مساعدة ==========
    
    /**
     * عرض رسالة تنبيه للمستخدم
     */
    function showMessage(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast-msg ${isError ? 'error' : 'success'}`;
        toast.innerHTML = `
            <i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}" aria-hidden="true"></i> 
            <span>${escapeHtml(msg)}</span>
        `;
        toast.setAttribute('role', 'alert');
        document.body.appendChild(toast);
        
        // إزالة تلقائية بعد 4 ثواني
        setTimeout(() => {            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }

    /**
     * تحديث حالة الاتصال في الواجهة
     */
    function updateConnectionStatus(isConnected) {
        const statusEl = document.getElementById('connectionStatus');
        const textEl = document.getElementById('connectionText');
        
        if (isConnected) {
            statusEl.className = 'connection-status online';
            textEl.textContent = 'متصل ✓';
        } else {
            statusEl.className = 'connection-status offline';
            textEl.textContent = 'غير متصل - جاري إعادة المحاولة...';
        }
    }

    /**
     * فحص حالة الاتصال قبل الإرسال
     */
    async function checkConnection() {
        return new Promise((resolve) => {
            const connectedRef = ref(db, '.info/connected');
            const unsubscribe = onValue(connectedRef, (snap) => {
                resolve(snap.val() === true);
                unsubscribe();
            }, { onlyOnce: true });
            
            // مهلة 5 ثواني
            setTimeout(() => {
                unsubscribe();
                resolve(false);
            }, 5000);
        });
    }

    /**
     * رفع ملف مع معالجة الأخطاء وإعادة المحاولة
     */
    async function uploadFileWithRetry(file, path, maxRetries = 3) {
        // التحقق من حجم الملف
        if (file.size > MAX_FILE_SIZE) {
            throw new Error(`حجم الملف يتجاوز الحد المسموح (${MAX_FILE_SIZE/1024/1024}MB)`);
        }
        
        // التحقق من نوع الملف        const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp', 'application/pdf'];
        if (!allowedTypes.includes(file.type)) {
            throw new Error('نوع الملف غير مدعوم. يرجى رفع صورة أو PDF');
        }
        
        for (let attempt = 1; attempt <= maxRetries; attempt++) {
            try {
                const fileReference = storageRef(storage, path);
                const metadata = {
                    contentType: file.type,
                    customMetadata: {
                        uploadedAt: new Date().toISOString(),
                        originalName: file.name
                    }
                };
                
                await uploadBytes(fileReference, file, metadata);
                return await getDownloadURL(fileReference);
                
            } catch (error) {
                console.warn(`⚠️ محاولة ${attempt} فشلت:`, error.message);
                
                if (attempt === maxRetries) {
                    throw error;
                }
                
                // انتظار أسي قبل إعادة المحاولة
                await new Promise(resolve => 
                    setTimeout(resolve, 1000 * Math.pow(2, attempt - 1))
                );
            }
        }
    }

    /**
     * هروب نصوص لمنع XSS
     */
    function escapeHtml(str) {
        if (!str) return '';
        const map = {
            '&': '&',
            '<': '<',
            '>': '>',
            '"': '"',
            "'": '&#039;'
        };
        return String(str).replace(/[&<>"']/g, m => map[m]);
    }

    /**     * التحقق من رقم الجوال السعودي
     */
    function validateSaudiPhone(phone) {
        return /^05[0-9]{8}$/.test(phone.replace(/\s+/g, ''));
    }

    /**
     * تنسيق التاريخ للعربية
     */
    function formatDate(dateString) {
        if (!dateString) return '';
        return new Date(dateString).toLocaleDateString('ar-EG', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    // ========== معالجة النموذج ==========
    
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const originalBtnText = submitBtn.innerHTML;
        
        // تعطيل الزر وعرض حالة التحميل
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading-spinner"></span> جاري المعالجة...';

        // جمع البيانات
        const formData = {
            fullName: document.getElementById('fullName').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            tripType: document.getElementById('tripType').value,
            destination: document.getElementById('destination').value.trim(),
            travelDate: document.getElementById('travelDate').value,
            ticketsCount: parseInt(document.getElementById('ticketsCount').value),
            receiptFile: document.getElementById('receiptFile').files[0],
            idFile: document.getElementById('idFile').files[0]
        };

        // ✅ التحقق من صحة البيانات
        const validationErrors = [];
        
        if (!formData.fullName || formData.fullName.length < 3) {
            validationErrors.push('يرجى إدخال اسم صحيح (3 أحرف على الأقل)');
        }        
        if (!validateSaudiPhone(formData.phone)) {
            validationErrors.push('يرجى إدخال رقم جوال سعودي صحيح (05xxxxxxxx)');
        }
        
        if (!formData.destination) {
            validationErrors.push('يرجى تحديد الوجهة');
        }
        
        if (!formData.travelDate) {
            validationErrors.push('يرجى تحديد تاريخ الرحلة');
        }
        
        if (!formData.receiptFile) {
            validationErrors.push('يرجى رفع سند الإيداع');
        }
        
        if (!formData.idFile) {
            validationErrors.push('يرجى رفع صورة الهوية');
        }

        if (validationErrors.length > 0) {
            showMessage(validationErrors[0], true);
            resetSubmitButton();
            return;
        }

        try {
            // ✅ فحص الاتصال أولاً
            const isConnected = await checkConnection();
            if (!isConnected) {
                throw new Error('لا يوجد اتصال بالإنترنت. يرجى التحقق من الشبكة والمحاولة مرة أخرى.');
            }

            // رفع الملفات
            const timestamp = Date.now();
            const receiptPath = `receipts/${timestamp}_${formData.receiptFile.name.replace(/\s+/g, '_')}`;
            const idPath = `ids/${timestamp}_${formData.idFile.name.replace(/\s+/g, '_')}`;
            
            showMessage('📤 جاري رفع الملفات...', false);
            
            const [receiptUrl, idUrl] = await Promise.all([
                uploadFileWithRetry(formData.receiptFile, receiptPath),
                uploadFileWithRetry(formData.idFile, idPath)
            ]);

            // حفظ البيانات في قاعدة البيانات
            const newBookingRef = push(ref(db, 'bookings'));
            await set(newBookingRef, {
                id: newBookingRef.key,                ...formData,
                receiptImageUrl: receiptUrl,
                idImageUrl: idUrl,
                status: 'pending',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            });

            // ✅ نجاح
            showMessage('✅ تم إرسال طلب الحجز بنجاح! سيتم مراجعته خلال 24 ساعة.');
            
            // إعادة تعيين النموذج
            document.getElementById('bookingForm').reset();
            document.getElementById('receiptName').innerText = 'لم يتم رفع ملف';
            document.getElementById('idName').innerText = 'لم يتم رفع ملف';
            
        } catch (error) {
            console.error('❌ خطأ في إرسال الطلب:', error);
            
            // معالجة أخطاء محددة
            let errorMsg = 'حدث خطأ غير متوقع';
            
            if (error.message.includes('permission-denied')) {
                errorMsg = '❌ غير مصرح: تحقق من إعدادات قواعد الأمان في Firebase';
            } else if (error.message.includes('storage/unauthorized')) {
                errorMsg = '❌ خطأ في رفع الملفات: تحقق من قواعد Storage';
            } else if (error.message.includes('network')) {
                errorMsg = '🌐 مشكلة في الشبكة: يرجى التحقق من اتصال الإنترنت';
            } else if (error.message.includes('حجم الملف')) {
                errorMsg = `⚠️ ${error.message}`;
            } else {
                errorMsg = `❌ ${error.message || 'فشل في معالجة الطلب'}`;
            }
            
            showMessage(errorMsg, true);
            
        } finally {
            resetSubmitButton();
        }

        function resetSubmitButton() {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalBtnText;
        }
    });

    // ========== لوحة التحكم ==========
    
    function renderAdminTable(bookings) {
        const tbody = document.getElementById('bookingsTbody');        
        if (!bookings || bookings.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="8" class="empty-state">
                        <i class="fas fa-clipboard-list" aria-hidden="true"></i>
                        <p>✨ لا توجد طلبات حجز حتى الآن ✨</p>
                    </td>
                </tr>
            `;
            return;
        }
        
        let html = '';
        bookings.forEach((booking, index) => {
            const isPending = booking.status === 'pending';
            const statusClass = isPending ? 'status-pending' : 'status-approved';
            const statusText = isPending ? 'قيد المراجعة' : '✅ معتمد';
            const statusIcon = isPending ? 'fa-clock' : 'fa-check';
            
            html += `
                <tr>
                    <td><strong>${index + 1}</strong></td>

                        <strong>${escapeHtml(booking.fullName)}</strong><br>
                        <small>📞 <a href="tel:${escapeHtml(booking.phone)}">${escapeHtml(booking.phone)}</a></small><br>
                        <small style="color:var(--text-secondary)">${formatDate(booking.createdAt)}</small>
                    </td>
                    <td>
                        ${escapeHtml(booking.destination)}<br>
                        <small>📅 ${booking.travelDate}</small><br>
                        <small>${booking.tripType}</small>
                    </td>
                    <td><strong>${booking.ticketsCount}</strong></td>
                    <td>
                        <span class="status-badge ${statusClass}">
                            <i class="fas ${statusIcon}" aria-hidden="true"></i> ${statusText}
                        </span>
                    </td>
                    <td>
                        <img src="${escapeHtml(booking.receiptImageUrl)}" 
                             class="thumbnail-img" 
                             alt="سند إيداع"
                             title="انقر للتكبير"
                             onclick="window.showImageModal('${escapeHtml(booking.receiptImageUrl)}')"
                             role="button"
                             tabindex="0"
                             onkeydown="if(event.key==='Enter') window.showImageModal('${escapeHtml(booking.receiptImageUrl)}')">
                    </td>
                    <td>                        <img src="${escapeHtml(booking.idImageUrl)}" 
                             class="thumbnail-img" 
                             alt="صورة هوية"
                             title="انقر للتكبير"
                             onclick="window.showImageModal('${escapeHtml(booking.idImageUrl)}')"
                             role="button"
                             tabindex="0"
                             onkeydown="if(event.key==='Enter') window.showImageModal('${escapeHtml(booking.idImageUrl)}')">
                    </td>
                    <td>
                        ${isPending ? `
                            <button class="action-btn approve-btn" 
                                    onclick="window.approveBooking('${booking.id}')" 
                                    title="اعتماد الحجز"
                                    aria-label="اعتماد حجز ${escapeHtml(booking.fullName)}">
                                <i class="fas fa-check-circle" aria-hidden="true"></i>
                            </button>
                        ` : `
                            <button class="action-btn approve-btn" disabled 
                                    style="opacity:0.5;cursor:not-allowed"
                                    title="تم الاعتماد"
                                    aria-label="تم اعتماد هذا الحجز">
                                <i class="fas fa-check" aria-hidden="true"></i>
                            </button>
                        `}
                        <button class="action-btn delete-btn" 
                                onclick="window.deleteBooking('${booking.id}')" 
                                title="حذف الطلب"
                                aria-label="حذف حجز ${escapeHtml(booking.fullName)}">
                            <i class="fas fa-trash-alt" aria-hidden="true"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
        
        tbody.innerHTML = html;
    }

    // ========== دوال عالمية للاستدعاء من الأزرار ==========
    
    window.approveBooking = async (bookingId) => {
        if (!currentUser) {
            showMessage('يجب تسجيل الدخول أولاً', true);
            return;
        }
        
        if (!confirm('هل أنت متأكد من اعتماد هذا الحجز؟')) return;
        
        try {            await update(ref(db, `bookings/${bookingId}`), { 
                status: 'approved',
                updatedAt: new Date().toISOString()
            });
            showMessage('✔ تم اعتماد الحجز بنجاح!');
        } catch(error) {
            console.error('خطأ في الاعتماد:', error);
            showMessage('❌ فشل في اعتماد الحجز: ' + error.message, true);
        }
    };

    window.deleteBooking = async (bookingId) => {
        if (!currentUser) {
            showMessage('يجب تسجيل الدخول أولاً', true);
            return;
        }
        
        if (!confirm('⚠️ هل أنت متأكد من حذف هذا الطلب نهائياً؟\nلا يمكن التراجع عن هذا الإجراء.')) return;
        
        try {
            // حذف البيانات من Realtime Database
            await remove(ref(db, `bookings/${bookingId}`));
            showMessage('🗑 تم حذف الطلب بنجاح');
        } catch(error) {
            console.error('خطأ في الحذف:', error);
            showMessage('❌ فشل في حذف الطلب: ' + error.message, true);
        }
    };

    window.showImageModal = (imageUrl) => {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        
        modalImg.src = imageUrl;
        modalImg.alt = 'صورة مكبرة';
        modal.style.display = 'flex';
        
        // منع التمرير في الخلفية
        document.body.style.overflow = 'hidden';
    };

    // ========== مراقبة حالة المصادقة ==========
    
    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        const adminPanel = document.getElementById('adminPanel');
        
        if (user) {
            // ✅ المستخدم مسجل الدخول
            adminPanel.style.display = 'block';            listenToBookings();
            showMessage('👋 مرحباً، تم تسجيل الدخول بنجاح');
        } else {
            // ❌ المستخدم غير مسجل
            adminPanel.style.display = 'none';
            if (bookingsListener) {
                bookingsListener();
                bookingsListener = null;
            }
        }
    });

    // ========== الاستماع للطلبات من Firebase ==========
    
    function listenToBookings() {
        // إلغاء المستمع السابق إن وجد
        if (bookingsListener) {
            bookingsListener();
        }
        
        const bookingsRef = ref(db, 'bookings');
        
        bookingsListener = onValue(bookingsRef, (snapshot) => {
            const data = snapshot.val();
            
            if (data) {
                // تحويل الكائن إلى مصفوفة وفرز حسب الأحدث
                allBookings = Object.values(data).sort((a, b) => 
                    new Date(b.createdAt) - new Date(a.createdAt)
                );
                
                if (currentUser) {
                    renderAdminTable(allBookings);
                }
            } else {
                allBookings = [];
                if (currentUser) {
                    renderAdminTable([]);
                }
            }
        }, (error) => {
            console.error('❌ خطأ في قراءة البيانات:', error);
            
            if (error.code === 'permission-denied') {
                showMessage('❌ لا توجد صلاحيات لعرض الطلبات', true);
            } else if (error.code === 'network-request-failed') {
                showMessage('🌐 تحقق من اتصال الإنترنت', true);
            }
        });
    }
    // ========== نافذة تسجيل الدخول ==========
    
    function showLoginModal() {
        // منع تكرار النافذة
        if (document.querySelector('.login-overlay')) return;
        
        const overlay = document.createElement('div');
        overlay.className = 'login-overlay';
        overlay.setAttribute('role', 'dialog');
        overlay.setAttribute('aria-modal', 'true');
        
        overlay.innerHTML = `
            <div class="login-card">
                <h3><i class="fas fa-user-shield" aria-hidden="true"></i> دخول المشرف</h3>
                
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" 
                       autocomplete="email" required
                       aria-label="البريد الإلكتروني للمشرف">
                
                <input type="password" id="loginPassword" placeholder="كلمة المرور" 
                       autocomplete="current-password" required
                       aria-label="كلمة المرور">
                
                <button id="doLoginBtn" class="btn-submit" style="margin-top:15px;">
                    <i class="fas fa-sign-in-alt" aria-hidden="true"></i> تسجيل الدخول
                </button>
                
                <p>
                    <strong>بيانات التجربة:</strong><br>
                    📧 admin@office-alhami.com<br>
                    🔑 admin123<br>
                    <small style="color:var(--warning)">⚠️ غيّر كلمة المرور في الإنتاج!</small>
                </p>
                
                <button id="closeLoginBtn">
                    <i class="fas fa-times" aria-hidden="true"></i> إغلاق
                </button>
            </div>
        `;
        
        document.body.appendChild(overlay);
        
        // إغلاق النافذة
        const closeLogin = () => overlay.remove();
        
        document.getElementById('closeLoginBtn').onclick = closeLogin;
        overlay.onclick = (e) => {
            if (e.target === overlay) closeLogin();
        };        
        // معالجة تسجيل الدخول
        document.getElementById('doLoginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!email || !password) {
                showMessage('يرجى إدخال البريد وكلمة المرور', true);
                return;
            }
            
            const btn = document.getElementById('doLoginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> جاري الدخول...';
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                closeLogin();
                // الرسالة ستظهر من onAuthStateChanged
            } catch(error) {
                console.error('فشل الدخول:', error);
                
                let errorMsg = 'فشل تسجيل الدخول';
                
                switch(error.code) {
                    case 'auth/user-not-found':
                        errorMsg = 'المستخدم غير موجود';
                        break;
                    case 'auth/wrong-password':
                        errorMsg = 'كلمة المرور غير صحيحة';
                        break;
                    case 'auth/invalid-email':
                        errorMsg = 'البريد الإلكتروني غير صحيح';
                        break;
                    case 'auth/too-many-requests':
                        errorMsg = 'محاولات كثيرة، يرجى المحاولة لاحقاً';
                        break;
                    case 'network-request-failed':
                        errorMsg = 'تحقق من اتصال الإنترنت';
                        break;
                    default:
                        errorMsg = error.message;
                }
                
                showMessage('❌ ' + errorMsg, true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
            }
        };        
        // دعم زر Enter
        document.getElementById('loginPassword').onkeydown = (e) => {
            if (e.key === 'Enter') {
                document.getElementById('doLoginBtn').click();
            }
        };
    }

    // ========== إنشاء حساب المشرف تلقائياً (للتطوير فقط) ==========

        // ⚠️ هذا الكود للتطوير فقط - احذفه في الإنتاج

                showMessage('خطأ في الخروج: ' + error.message, true);

        document.getElementById('closeModalBtn').onclick = () => {
            document.getElementById('imageModal').style.display = 'none';
            document.body.style.overflow = '';
        };
        
        window.onclick = (e) => {
            const modal = document.getElementById('imageModal');
            if (e.target === modal) {
                modal.style.display = 'none';
                document.body.style.overflow = '';
            }
        };
        
        // دعم لوحة المفاتيح للمودال
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('imageModal').style.display = 'none';
                document.body.style.overflow = '';
            }
        });
    });

    /**
     * إعداد رفع الملفات مع معاينة
     */
    function setupFileUpload(triggerId, fileInputId, spanId) {
        const trigger = document.getElementById(triggerId);
        const fileInput = document.getElementById(fileInputId);
        const span = document.getElementById(spanId);
        
        // النقر على التسمية يفتح ملف الاختيار
        trigger.onclick = () => fileInput.click();
        trigger.onkeydown = (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                fileInput.click();
            }
        };
                // عند اختيار ملف
        fileInput.onchange = () => {
            const file = fileInput.files[0];
            
            if (file) {
                // التحقق من الحجم
                if (file.size > MAX_FILE_SIZE) {
                    showMessage(`⚠️ حجم "${file.name}" يتجاوز ${MAX_FILE_SIZE/1024/1024}MB`, true);
                    fileInput.value = '';
                    span.innerText = 'لم يتم رفع ملف';
                    return;
                }
                
                // عرض اسم الملف وحجمه
                const sizeKB = (file.size / 1024).toFixed(1);
                span.innerHTML = `
                    <i class="fas fa-check-circle text-success" aria-hidden="true"></i> 
                    <strong>${escapeHtml(file.name)}</strong> 
                    <small>(${sizeKB} KB)</small>
                `;
            } else {
                span.innerText = 'لم يتم رفع ملف';
            }
        };
    }

    // ========== تنظيف عند إغلاق الصفحة ==========
    
    window.addEventListener('beforeunload', () => {
        if (bookingsListener) {
            bookingsListener();
        }
    });

</script>

<script>
    // منع النقر المزدوج على الأزرار
    document.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (btn && !btn.disabled) {
            btn.dataset.clicked = 'true';
            setTimeout(() => delete btn.dataset.clicked, 500);
        }
    });
    
    // تحسين أداء الصور
    if ('loading' in HTMLImageElement.prototype) {
        document.querySelectorAll('img').forEach(img => {            img.loading = 'lazy';
        });
    }
    
    // تسجيل الأخطاء للتحليل (اختياري)
    window.addEventListener('error', (e) => {
        console.error('خطأ في الواجهة:', e.message, e.filename, e.lineno);
        // يمكن إرسال الأخطاء لخدمة مراقبة هنا
    });
</script>
