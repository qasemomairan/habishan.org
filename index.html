<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الراقي للحجز | طيران وباصات - نظام متكامل مع Firebase</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDK v9 (modular) -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #f5f7fc 0%, #eef2f5 100%);
            padding: 30px 20px;
        }
        .container { max-width: 1400px; margin: auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .logo {
            background: linear-gradient(135deg, #0b2b40, #1b4f6e);
            display: inline-block;
            padding: 18px 40px;
            border-radius: 100px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .logo h1 { font-size: 2rem; color: #f9c74f; }
        .logo span { color: #f0f3f5; }
        .card {
            background: white;
            border-radius: 32px;
            padding: 30px;
            margin-bottom: 45px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
        }
        .card-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #134b66;
            border-right: 6px solid #f9c74f;
            padding-right: 18px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 22px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        input, select, .file-label {
            padding: 12px 16px;
            border-radius: 28px;
            border: 1.5px solid #dce4ec;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus, select:focus { border-color: #f9c74f; outline: none; box-shadow: 0 0 0 3px rgba(249,199,79,0.2); }
        .file-label {
            background: #f8fafd;
            text-align: center;
            cursor: pointer;
            border-style: dashed;
        }
        .btn-submit {
            background: linear-gradient(95deg, #134b66, #1b6b8f);
            border: none;
            color: white;
            font-weight: bold;
            padding: 14px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-size: 1.1rem;
            transition: 0.2s;
        }
        .btn-submit:hover { transform: scale(0.98); opacity: 0.9; }
        .btn-logout {
            background: #9e2a2a;
            width: auto;
            padding: 8px 20px;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #eef2f8; padding: 12px; color: #134b66; }
        td { padding: 12px 8px; border-bottom: 1px solid #e4e9f0; vertical-align: middle; }
        .status-badge { padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: bold; display: inline-block; }
        .status-pending { background: #fff3df; color: #c47a00; }
        .status-approved { background: #e0f7ea; color: #1e7b48; }
        .thumbnail-img { width: 48px; height: 48px; object-fit: cover; border-radius: 12px; cursor: pointer; border: 1px solid #ddd; }
        .action-btn { background: none; border: none; font-size: 1.2rem; margin: 0 4px; cursor: pointer; padding: 6px; border-radius: 30px; width: 34px; }
        .approve-btn { color: #2a9d8f; background: #eafaf7; }
        .delete-btn { color: #e76f51; background: #feece7; }
        .login-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center;
            z-index: 2000;
        }
        .login-card {
            background: white; border-radius: 48px; padding: 40px; width: 90%; max-width: 400px;
            text-align: center;
        }
        .toast-msg {
            position: fixed; bottom: 20px; left: 20px; background: #1e2a3e; color: white;
            padding: 12px 24px; border-radius: 60px; z-index: 3000;
            font-weight: 500;
        }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 4000; }
        .modal-content { background: white; border-radius: 28px; padding: 20px; max-width: 90%; }
        .modal-content img { max-width: 100%; max-height: 80vh; border-radius: 20px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        @media (max-width:700px) { th, td { font-size: 0.7rem; padding: 6px 4px; } .card { padding: 20px; } }
        .file-info { font-size: 0.75rem; color: #4a6f8a; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><h1>الرَاقي <i class="fas fa-plane-departure"></i></h1><span>سفر وباصات فاخرة • حجز آمن مع توثيق الهوية</span></div>
        <button id="showAdminLoginBtn" style="margin-top:15px; background:#f9c74f; border:none; padding:8px 25px; border-radius:40px; font-weight:bold; cursor:pointer;"><i class="fas fa-lock"></i> دخول المشرف</button>
    </div>

    <!-- نموذج حجز العملاء -->
    <div class="card">
        <div class="card-title"><i class="fas fa-pen-alt"></i><span>طلب حجز جديد</span></div>
        <form id="bookingForm">
            <div class="form-grid">
                <div class="input-group"><label><i class="fas fa-user"></i> الاسم الكامل</label><input type="text" id="fullName" required></div>
                <div class="input-group"><label><i class="fas fa-phone-alt"></i> رقم الجوال</label><input type="tel" id="phone" placeholder="05xxxxxxxx" required></div>
                <div class="input-group"><label><i class="fas fa-bus"></i> نوع الرحلة</label><select id="tripType" required><option value="طيران">✈️ طيران</option><option value="باصات">🚍 باصات داخلي</option></select></div>
                <div class="input-group"><label><i class="fas fa-map-marker-alt"></i> الوجهة</label><input type="text" id="destination" placeholder="مثال: الرياض - دبي" required></div>
                <div class="input-group"><label><i class="fas fa-calendar-alt"></i> تاريخ الرحلة</label><input type="date" id="travelDate" required></div>
                <div class="input-group"><label><i class="fas fa-ticket"></i> عدد التذاكر</label><input type="number" id="ticketsCount" min="1" max="20" value="1" required></div>
                <div class="input-group"><label><i class="fas fa-upload"></i> سند الإيداع (بنك/صرافة)</label>
                    <input type="file" id="receiptFile" accept="image/*" style="display:none;">
                    <div class="file-label" id="receiptLabel"><i class="fas fa-cloud-upload-alt"></i> اختر صورة السند</div>
                    <span id="receiptName" class="file-info">لم يتم رفع ملف</span>
                </div>
                <div class="input-group"><label><i class="fas fa-id-card"></i> صورة الجواز / البطاقة</label>
                    <input type="file" id="idFile" accept="image/*" style="display:none;">
                    <div class="file-label" id="idLabel"><i class="fas fa-id-card"></i> اختر صورة الهوية</div>
                    <span id="idName" class="file-info">لم يتم رفع ملف</span>
                </div>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn"><i class="fas fa-check-circle"></i> إرسال طلب الحجز</button>
        </form>
    </div>

    <!-- لوحة التحكم (تظهر فقط بعد تسجيل الدخول) -->
    <div id="adminPanel" style="display:none;">
        <div class="card">
            <div class="flex-between">
                <div class="card-title"><i class="fas fa-tachometer-alt"></i><span>لوحة التحكم - جميع طلبات الحجز</span></div>
                <button id="logoutBtn" class="btn-submit btn-logout"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
            </div>
            <div class="table-wrapper" style="overflow-x:auto;">
                <table>
                    <thead><tr><th>#</th><th>العميل / الجوال</th><th>الوجهة / التاريخ</th><th>عدد</th><th>الحالة</th><th>سند الإيداع</th><th>صورة الهوية</th><th>إجراءات</th></thead>
                    <tbody id="bookingsTbody"><tr><td colspan="8" style="text-align:center;">جاري تحميل الطلبات...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- مودال عرض الصور -->
<div id="imageModal" class="modal"><div class="modal-content"><img id="modalImage" src=""><br><button id="closeModalBtn" style="margin-top:15px; padding:8px 20px; border-radius:40px; border:none; background:#134b66; color:white; cursor:pointer;">إغلاق</button></div></div>

<script type="module">
    // استيراد Firebase
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, set, onValue, update, remove } from "firebase/database";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "firebase/storage";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword } from "firebase/auth";

    // إعدادات Firebase (المقدمة من المستخدم)
    const firebaseConfig = {
        apiKey: "AIzaSyCJVxsARueQKDK6ETJonkV-ov8jRRLreXg",
        authDomain: "office-alhami.firebaseapp.com",
        databaseURL: "https://office-alhami-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "office-alhami",
        storageBucket: "office-alhami.firebasestorage.app",
        messagingSenderId: "77683467575",
        appId: "1:77683467575:web:05c492a00676334528a6b2"
    };

    // تهيئة Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);
    const auth = getAuth(app);

    // متغيرات
    let currentUser = null;
    let bookingsListener = null;
    let allBookings = [];

    // دوال مساعدة
    function showMessage(msg, isErr = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.style.backgroundColor = isErr ? '#b23c1c' : '#1e6f5c';
        toast.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    // رفع ملف إلى Firebase Storage
    async function uploadFile(file, path) {
        const fileRef = storageRef(storage, path);
        await uploadBytes(fileRef, file);
        return await getDownloadURL(fileRef);
    }

    // إرسال طلب حجز جديد
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع...';

        const fullName = document.getElementById('fullName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const tripType = document.getElementById('tripType').value;
        const destination = document.getElementById('destination').value.trim();
        const travelDate = document.getElementById('travelDate').value;
        const ticketsCount = parseInt(document.getElementById('ticketsCount').value);
        const receiptFile = document.getElementById('receiptFile').files[0];
        const idFile = document.getElementById('idFile').files[0];

        if (!fullName || !phone || !destination || !travelDate) {
            showMessage('يرجى ملء جميع الحقول المطلوبة', true);
            submitBtn.disabled = false; submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> إرسال طلب الحجز'; return;
        }
        if (!receiptFile) { showMessage('يرجى رفع سند الإيداع', true); submitBtn.disabled = false; submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> إرسال طلب الحجز'; return; }
        if (!idFile) { showMessage('يرجى رفع صورة الهوية (جواز أو بطاقة)', true); submitBtn.disabled = false; submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> إرسال طلب الحجز'; return; }

        try {
            const timestamp = Date.now();
            const receiptUrl = await uploadFile(receiptFile, `receipts/${timestamp}_${receiptFile.name}`);
            const idUrl = await uploadFile(idFile, `ids/${timestamp}_${idFile.name}`);

            const newBookingRef = push(ref(db, 'bookings'));
            await set(newBookingRef, {
                id: newBookingRef.key,
                fullName, phone, tripType, destination, travelDate, ticketsCount,
                receiptImageUrl: receiptUrl,
                idImageUrl: idUrl,
                status: 'pending',
                createdAt: new Date().toISOString()
            });
            showMessage('✅ تم إرسال طلب الحجز بنجاح! سيتم مراجعته قريباً.');
            document.getElementById('bookingForm').reset();
            document.getElementById('receiptName').innerText = 'لم يتم رفع ملف';
            document.getElementById('idName').innerText = 'لم يتم رفع ملف';
            // إعادة تعيين حقول الملفات
            document.getElementById('receiptFile').value = '';
            document.getElementById('idFile').value = '';
        } catch (err) {
            console.error(err);
            showMessage('خطأ: ' + err.message, true);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> إرسال طلب الحجز';
        }
    });

    // عرض الجدول في لوحة التحكم
    function renderAdminTable(bookings) {
        const tbody = document.getElementById('bookingsTbody');
        if (!bookings || bookings.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">✨ لا توجد طلبات حجز حتى الآن ✨</td></tr>';
            return;
        }
        let html = '';
        bookings.forEach((b, idx) => {
            const statusClass = b.status === 'pending' ? 'status-pending' : 'status-approved';
            const statusText = b.status === 'pending' ? 'قيد المراجعة' : '✅ مؤكد ومعتمد';
            html += `<tr>
                <td>${idx+1}</td>
                <td><strong>${escapeHtml(b.fullName)}</strong><br><small>📞 ${escapeHtml(b.phone)}</small><br><small style="font-size:10px;">${new Date(b.createdAt).toLocaleString('ar-EG')}</small></td>
                <td>${escapeHtml(b.destination)}<br><small>📅 ${b.travelDate}</small><br>${b.tripType}</td>
                <td>${b.ticketsCount}</td>
                <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                <td><img src="${b.receiptImageUrl}" class="thumbnail-img" onclick="window.showImageModal('${b.receiptImageUrl}')" title="سند الإيداع"></td>
                <td><img src="${b.idImageUrl}" class="thumbnail-img" onclick="window.showImageModal('${b.idImageUrl}')" title="صورة الهوية"></td>
                <td>
                    ${b.status !== 'approved' ? `<button class="action-btn approve-btn" onclick="window.approveBooking('${b.id}')" title="اعتماد الحجز"><i class="fas fa-check-circle"></i></button>` : `<button class="action-btn approve-btn" disabled style="opacity:0.5;"><i class="fas fa-check"></i></button>`}
                    <button class="action-btn delete-btn" onclick="window.deleteBooking('${b.id}')" title="حذف الطلب"><i class="fas fa-trash-alt"></i></button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    // دوال عالمية للاستدعاء من الأزرار
    window.approveBooking = async (id) => {
        if (!currentUser) { showMessage('يجب تسجيل الدخول أولاً', true); return; }
        try {
            await update(ref(db, `bookings/${id}`), { status: 'approved' });
            showMessage('✔ تم اعتماد الحجز بنجاح!');
        } catch(e) { showMessage('خطأ: '+e.message, true); }
    };
    window.deleteBooking = async (id) => {
        if (!currentUser) { showMessage('يجب تسجيل الدخول أولاً', true); return; }
        if (confirm('هل أنت متأكد من حذف هذا الطلب نهائياً؟')) {
            try {
                await remove(ref(db, `bookings/${id}`));
                showMessage('🗑 تم حذف الطلب');
            } catch(e) { showMessage('خطأ: '+e.message, true); }
        }
    };
    window.showImageModal = (url) => {
        document.getElementById('modalImage').src = url;
        document.getElementById('imageModal').style.display = 'flex';
    };
    function escapeHtml(str) { 
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});
    }

    // الاستماع للطلبات من Firebase
    function listenToBookings() {
        if (bookingsListener) bookingsListener();
        const bookingsRef = ref(db, 'bookings');
        bookingsListener = onValue(bookingsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                allBookings = Object.values(data).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                if (currentUser) renderAdminTable(allBookings);
            } else {
                allBookings = [];
                if (currentUser) renderAdminTable([]);
            }
        });
    }

    // نافذة تسجيل الدخول
    function showLoginModal() {
        const overlay = document.createElement('div');
        overlay.className = 'login-overlay';
        overlay.innerHTML = `
            <div class="login-card">
                <h3><i class="fas fa-user-shield"></i> دخول المشرف</h3>
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" style="width:100%; margin:10px 0; padding:12px; border-radius:30px; border:1px solid #ccc;">
                <input type="password" id="loginPassword" placeholder="كلمة المرور" style="width:100%; margin:10px 0 20px; padding:12px; border-radius:30px; border:1px solid #ccc;">
                <button id="doLoginBtn" class="btn-submit" style="margin-top:0;">تسجيل الدخول</button>
                <p style="margin-top:15px; font-size:12px; color:#666;">📧 admin@office-alhami.com<br>🔑 admin123</p>
                <button id="closeLoginBtn" style="margin-top:15px; background:none; border:none; color:#888; cursor:pointer;">إغلاق</button>
            </div>
        `;
        document.body.appendChild(overlay);
        document.getElementById('doLoginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pwd = document.getElementById('loginPassword').value.trim();
            if (!email || !pwd) { showMessage('أدخل البريد وكلمة المرور', true); return; }
            try {
                await signInWithEmailAndPassword(auth, email, pwd);
                overlay.remove();
                showMessage('تم تسجيل الدخول بنجاح');
            } catch(err) {
                let msg = 'فشل الدخول: ';
                if (err.code === 'auth/user-not-found') msg += 'المستخدم غير موجود';
                else if (err.code === 'auth/wrong-password') msg += 'كلمة مرور خاطئة';
                else msg += err.message;
                showMessage(msg, true);
            }
        };
        document.getElementById('closeLoginBtn').onclick = () => overlay.remove();
    }

    // مراقبة حالة تسجيل الدخول
    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
            document.getElementById('adminPanel').style.display = 'block';
            listenToBookings();
        } else {
            document.getElementById('adminPanel').style.display = 'none';
            if (bookingsListener) { bookingsListener(); bookingsListener = null; }
        }
    });

    // أزرار الواجهة
    document.getElementById('showAdminLoginBtn').onclick = showLoginModal;
    document.getElementById('logoutBtn').onclick = async () => {
        await signOut(auth);
        showMessage('تم تسجيل الخروج');
    };

    // إغلاق مودال الصورة
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('imageModal').style.display = 'none';
    window.onclick = (e) => { if(e.target === document.getElementById('imageModal')) document.getElementById('imageModal').style.display = 'none'; };

    // تحديد أدنى تاريخ
    document.getElementById('travelDate').min = new Date().toISOString().split('T')[0];

    // رفع الملفات (تحسين واجهة المستخدم)
    function setupFileUpload(triggerId, fileInputId, spanId) {
        const trigger = document.getElementById(triggerId);
        const fileInput = document.getElementById(fileInputId);
        const span = document.getElementById(spanId);
        trigger.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            if (fileInput.files.length) span.innerText = fileInput.files[0].name;
            else span.innerText = 'لم يتم رفع ملف';
        };
    }
    setupFileUpload('receiptLabel', 'receiptFile', 'receiptName');
    setupFileUpload('idLabel', 'idFile', 'idName');

    // إنشاء حساب مشرف تلقائياً إذا لم يكن موجوداً (للتسهيل)
    (async () => {
        try {
            await signInWithEmailAndPassword(auth, 'admin@office-alhami.com', 'admin123');
        } catch(e) {
            if (e.code === 'auth/user-not-found') {
                try {
                    await createUserWithEmailAndPassword(auth, 'admin@office-alhami.com', 'admin123');
                    console.log('تم إنشاء حساب المشرف تلقائياً');
                    showMessage('تم إنشاء حساب المشرف: admin@office-alhami.com / admin123');
                } catch(createErr) { console.warn('تحقق من تفعيل Email/Password في Firebase Console'); }
            }
        }
    })();
</script>
</body>
</html>
